<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>땡겨요</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f5;color:#222}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea,select{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

/* ─────────────────────────────────────────
   API
───────────────────────────────────────── */
const api = {
  getToken: () => sessionStorage.getItem("token"),
  setToken: (t) => sessionStorage.setItem("token", t),
  clearToken: () => sessionStorage.removeItem("token"),

  authHeaders: () => ({
    "Content-Type": "application/json",
    "Authorization": `Bearer ${sessionStorage.getItem("token")}`
  }),

  // 인증
  signup: async (body) => {
    const res = await fetch("/api/auth/signup", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || "회원가입에 실패했습니다.");
    }
  },
  login: async (body) => {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error("이메일 또는 비밀번호가 올바르지 않습니다.");
    return res.json();
  },

  // 메뉴 (상품) - /api/store/{storeId}/menu
  getMenusByStore: async (storeId) => {
    const res = await fetch(`/api/store/${storeId}/menu`, {headers: {"Content-Type": "application/json"}});
    if (!res.ok) throw new Error("메뉴 조회 실패");
    return res.json();
  },
  getMenu: async (storeId, menuId) => {
    const res = await fetch(`/api/store/${storeId}/menu/${menuId}`, {headers: {"Content-Type": "application/json"}});
    if (!res.ok) throw new Error("메뉴 상세 조회 실패");
    return res.json();
  },
  createMenu: async (storeId, body) => {
    const res = await fetch(`/api/store/${storeId}/menu`, {
      method: "POST", headers: api.authHeaders(), body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error("메뉴 등록 실패");
    return res.json();
  },
  updateMenu: async (storeId, menuId, body) => {
    const res = await fetch(`/api/store/${storeId}/menu/${menuId}`, {
      method: "PUT", headers: api.authHeaders(), body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error("메뉴 수정 실패");
    return res.json();
  },
  deleteMenu: async (storeId, menuId) => {
    const res = await fetch(`/api/store/${storeId}/menu/${menuId}`, {
      method: "DELETE", headers: api.authHeaders()
    });
    if (!res.ok) throw new Error("메뉴 삭제 실패");
  },

  // 주문
  createOrder: async (body) => {
    const res = await fetch("/api/orders", {
      method: "POST", headers: api.authHeaders(), body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error("주문 실패");
    return res.json();
  },
  getMyOrders: async () => {
    const res = await fetch("/api/orders", {headers: api.authHeaders()});
    if (!res.ok) throw new Error("주문 내역 조회 실패");
    return res.json();
  }
};

/* ─────────────────────────────────────────
   더미 데이터 (storeId 포함)
───────────────────────────────────────── */
const DUMMY_PRODUCTS = [
  {id:1,storeId:1,name:"황금올리브 후라이드",category:"치킨",price:18000,popularity:true,description:"바삭한 튀김옷의 정통 치킨",storeName:"맛있는 치킨집",img:"🍗"},
  {id:2,storeId:1,name:"매콤달콤 양념치킨",category:"치킨",price:18000,popularity:true,description:"달콤매콤한 양념 치킨",storeName:"맛있는 치킨집",img:"🍗"},
  {id:3,storeId:1,name:"반반치킨",category:"치킨",price:19000,popularity:false,description:"후라이드+양념 반반",storeName:"맛있는 치킨집",img:"🍗"},
  {id:4,storeId:2,name:"연어 아보카도 롤",category:"일식",price:16000,popularity:true,description:"신선한 연어와 아보카도",storeName:"스시히로",img:"🍣"},
  {id:5,storeId:2,name:"참치 사시미",category:"일식",price:22000,popularity:false,description:"신선한 참치 사시미",storeName:"스시히로",img:"🍣"},
  {id:6,storeId:3,name:"떡볶이",category:"분식",price:7000,popularity:true,description:"매콤달콤한 떡볶이",storeName:"엄마손 분식",img:"🍢"},
  {id:7,storeId:3,name:"순대국밥",category:"분식",price:9000,popularity:false,description:"든든한 순대국밥",storeName:"엄마손 분식",img:"🍲"},
];

const STATUS_LABEL = {PENDING:"주문접수", ORDERED:"주문완료", DELIVERING:"배달중", DELIVERED:"배달완료"};
const STATUS_COLOR = {PENDING:"#888", ORDERED:"#0066cc", DELIVERING:"#ff6b00", DELIVERED:"#2d7a2d"};
const STATUS_BG    = {PENDING:"#f5f5f5", ORDERED:"#e6f7ff", DELIVERING:"#fff0e6", DELIVERED:"#f0fff4"};
const CATEGORIES   = ["전체","치킨","일식","분식","중식","버거","피자"];

/* ─────────────────────────────────────────
   Header
───────────────────────────────────────── */
function Header({setPage, user, setUser}) {
  return (
    <div style={{background:"#ff6b00",padding:"0 16px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
      <button onClick={()=>setPage("main")} style={{color:"#fff",fontSize:20,fontWeight:700}}>🛵 땡겨요</button>
      <div style={{display:"flex",gap:6}}>
        {user ? (
          <>
            {user.role==="OWNER" && (
              <button onClick={()=>setPage("register")}
                style={{color:"#fff",fontSize:13,padding:"6px 10px",borderRadius:16,background:"rgba(255,255,255,0.25)",fontWeight:600}}>
                + 메뉴등록
              </button>
            )}
            <button onClick={()=>setPage("orders")}
              style={{color:"#fff",fontSize:13,padding:"6px 10px",borderRadius:16,background:"rgba(255,255,255,0.25)"}}>
              내 주문
            </button>
            <button onClick={()=>{api.clearToken();setUser(null);setPage("main");}}
              style={{color:"#fff",fontSize:13,padding:"6px 10px",borderRadius:16,background:"rgba(255,255,255,0.25)"}}>
              로그아웃
            </button>
          </>
        ) : (
          <button onClick={()=>setPage("login")}
            style={{color:"#ff6b00",fontSize:13,fontWeight:700,padding:"6px 14px",borderRadius:16,background:"#fff"}}>
            로그인
          </button>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   MainPage - 더미 데이터 사용 (백엔드 메뉴 API 연결 시 주석 해제)
───────────────────────────────────────── */
function MainPage({setPage, setSelectedProduct, user}) {
  const [category, setCategory] = useState("전체");
  const [search, setSearch] = useState("");
    const [products, setProducts] = useState([]);

    useEffect(() => {
        // 가게 1, 2, 3 메뉴 전부 불러오기
        Promise.all([
            api.getMenusByStore(1),
            api.getMenusByStore(2),
            api.getMenusByStore(3),
        ]).then(([store1, store2, store3]) => {
            const extract = (data) => {
                const embedded = data._embedded;
                if (!embedded) return [];
                const key = Object.keys(embedded)[0];
                return embedded[key] || [];
            };
            const all = [
                ...extract(store1).map(m => ({...m, id: m.menuId, storeId: m.storeId, img:"🍗", storeName:"맛있는 치킨집"})),
                ...extract(store2).map(m => ({...m, id: m.menuId, storeId: m.storeId, img:"🍣", storeName:"스시히로"})),
                ...extract(store3).map(m => ({...m, id: m.menuId, storeId: m.storeId, img:"🍢", storeName:"엄마손 분식"})),
            ];
            setProducts(all);
        }).catch(e => {
            console.error("메뉴 조회 실패, 더미 데이터 사용", e);
            setProducts(DUMMY_PRODUCTS);
        });
    }, []);

  const filtered = products.filter(p =>
    (category === "전체" || p.category === category) &&
    (p.name.includes(search) || p.category.includes(search) || p.storeName?.includes(search))
  );

  const handleDelete = async (e, product) => {
    e.stopPropagation();
    if (!confirm("메뉴를 삭제하시겠습니까?")) return;
    try {
      await api.deleteMenu(product.storeId, product.id);
      setProducts(prev => prev.filter(p => p.id !== product.id));
    } catch(err) { alert(err.message); }
  };

  return (
    <div>
      <div style={{background:"#ff6b00",padding:"14px 16px 20px"}}>
        <div style={{background:"#fff",borderRadius:24,display:"flex",alignItems:"center",padding:"10px 16px",gap:8}}>
          <span style={{color:"#aaa"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="메뉴명, 가게명 검색"
            style={{border:"none",outline:"none",flex:1,fontSize:14}}/>
          {search && <button onClick={()=>setSearch("")} style={{color:"#aaa"}}>✕</button>}
        </div>
      </div>
      <div style={{background:"#fff",borderBottom:"1px solid #eee",padding:"10px 16px",overflowX:"auto",display:"flex",gap:6,whiteSpace:"nowrap"}}>
        {CATEGORIES.map(c=>(
          <button key={c} onClick={()=>setCategory(c)}
            style={{padding:"6px 14px",borderRadius:18,fontSize:13,fontWeight:600,flexShrink:0,border:"none",
              background:category===c?"#ff6b00":"#f5f5f5",color:category===c?"#fff":"#666"}}>
            {c}
          </button>
        ))}
      </div>
      <div style={{padding:"14px 16px"}}>
        <p style={{fontSize:13,color:"#999",marginBottom:12}}>{filtered.length}개의 메뉴</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {filtered.map(product=>(
            <div key={product.id} onClick={()=>{setSelectedProduct(product);setPage("detail");}}
              style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #f0f0f0",cursor:"pointer"}}>
              <div style={{background:"#fff8f0",height:90,display:"flex",alignItems:"center",justifyContent:"center",fontSize:48}}>
                {product.img||"🍽️"}
              </div>
              <div style={{padding:"10px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
                  <p style={{fontWeight:700,fontSize:14,flex:1,lineHeight:1.3}}>{product.name}</p>
                  {product.popularity && <span style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:"#fff0e6",color:"#ff6b00",fontWeight:700,flexShrink:0,marginLeft:4}}>인기</span>}
                </div>
                <p style={{fontSize:11,color:"#bbb",marginBottom:4}}>{product.storeName}</p>
                <p style={{fontSize:14,fontWeight:700,color:"#ff6b00"}}>{product.price?.toLocaleString()}원</p>
                {user?.role==="OWNER" && (
                  <div style={{display:"flex",gap:4,marginTop:8}} onClick={e=>e.stopPropagation()}>
                    <button onClick={e=>{e.stopPropagation();setSelectedProduct(product);setPage("edit");}}
                      style={{flex:1,padding:"5px",borderRadius:6,background:"#f5f5f5",fontSize:11,color:"#555",border:"none"}}>수정</button>
                    <button onClick={e=>handleDelete(e, product)}
                      style={{flex:1,padding:"5px",borderRadius:6,background:"#fff0f0",fontSize:11,color:"#e44",border:"none"}}>삭제</button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
        {filtered.length===0 && (
          <div style={{textAlign:"center",padding:"40px 0",color:"#bbb"}}>
            <p style={{fontSize:32,marginBottom:8}}>🍽️</p>
            <p style={{fontSize:14}}>검색 결과가 없습니다</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   DetailPage
───────────────────────────────────────── */
function DetailPage({product, setPage, user, setOrderProduct}) {
  if (!product) { setPage("main"); return null; }
  return (
    <div style={{paddingBottom:80}}>
      <div style={{background:"#fff8f0",height:160,display:"flex",alignItems:"center",justifyContent:"center",fontSize:90,borderBottom:"1px solid #f0f0f0"}}>
        {product.img||"🍽️"}
      </div>
      <div style={{background:"#fff",padding:"20px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <h2 style={{fontSize:22,fontWeight:700,flex:1}}>{product.name}</h2>
          {product.popularity && <span style={{fontSize:12,padding:"3px 10px",borderRadius:12,background:"#fff0e6",color:"#ff6b00",fontWeight:700}}>인기</span>}
        </div>
        <p style={{fontSize:13,color:"#bbb",marginBottom:4}}>{product.storeName} · {product.category}</p>
        <p style={{fontSize:14,color:"#777",lineHeight:1.6,marginBottom:16}}>{product.description}</p>
        <p style={{fontSize:24,fontWeight:700,color:"#ff6b00"}}>{product.price?.toLocaleString()}원</p>
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:"12px 16px",borderTop:"1px solid #f0f0f0",display:"flex",gap:10}}>
        <button onClick={()=>setPage("main")}
          style={{padding:"12px 20px",borderRadius:12,border:"1px solid #eee",fontSize:14,fontWeight:600,color:"#555",background:"#fff"}}>
          ← 뒤로
        </button>
        <button onClick={()=>{if(!user){setPage("login");return;} setOrderProduct(product);setPage("order");}}
          style={{flex:1,background:"#ff6b00",color:"#fff",padding:"12px",borderRadius:12,fontSize:15,fontWeight:700,border:"none"}}>
          주문하기
        </button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   OrderPage
───────────────────────────────────────── */
function OrderPage({product, setPage, user}) {
  const [qty, setQty] = useState(1);
  const [payment, setPayment] = useState("CARD");
  const [requests, setRequests] = useState("");
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  if (!product) { setPage("main"); return null; }
  const total = product.price * qty;

  const handleOrder = async () => {
    if (!user) { setPage("login"); return; }
    setLoading(true);
    try {
      await api.createOrder({
        productId: product.id,  // menuId = productId
        quantity: qty
      });
      setDone(true);
    } catch(e) {
      alert(e.message);
    } finally {
      setLoading(false);
    }
    if (!done) setDone(true);
    setTimeout(()=>setPage("orders"), 1500);
  };

  if (done) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16}}>
      <div style={{fontSize:64}}>✅</div>
      <p style={{fontSize:20,fontWeight:700}}>주문 완료!</p>
      <p style={{fontSize:14,color:"#aaa"}}>주문 내역으로 이동합니다...</p>
    </div>
  );

  return (
    <div style={{paddingBottom:120}}>
      <div style={{background:"#fff",padding:"16px",borderBottom:"1px solid #f0f0f0"}}>
        <p style={{fontWeight:700,fontSize:16,marginBottom:12}}>주문 메뉴</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0"}}>
          <div>
            <p style={{fontWeight:600,fontSize:15,marginBottom:2}}>{product.name}</p>
            <p style={{fontSize:13,color:"#aaa"}}>{product.price?.toLocaleString()}원</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setQty(q=>Math.max(1,q-1))}
              style={{width:28,height:28,borderRadius:14,border:"1px solid #ddd",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",background:"#fff"}}>-</button>
            <span style={{fontSize:15,fontWeight:700,minWidth:24,textAlign:"center"}}>{qty}</span>
            <button onClick={()=>setQty(q=>q+1)}
              style={{width:28,height:28,borderRadius:14,border:"none",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",background:"#ff6b00",color:"#fff"}}>+</button>
          </div>
        </div>
      </div>
      <div style={{background:"#fff",padding:"16px",borderBottom:"1px solid #f0f0f0",marginTop:8}}>
        <p style={{fontWeight:700,marginBottom:10}}>결제 수단</p>
        {[["CARD","카드"],["CASH","현금"],["KAKAO_PAY","카카오페이"],["NAVER_PAY","네이버페이"]].map(([val,label])=>(
          <button key={val} onClick={()=>setPayment(val)}
            style={{padding:"7px 14px",borderRadius:18,fontSize:13,marginRight:6,marginBottom:6,border:"none",fontWeight:600,
              background:payment===val?"#ff6b00":"#f5f5f5",color:payment===val?"#fff":"#666"}}>
            {label}
          </button>
        ))}
      </div>
      <div style={{background:"#fff",padding:"16px",marginTop:8}}>
        <p style={{fontWeight:700,marginBottom:8}}>요청 사항</p>
        <textarea value={requests} onChange={e=>setRequests(e.target.value)}
          placeholder="가게에 전달할 메시지 (선택)"
          style={{width:"100%",border:"1px solid #eee",borderRadius:8,padding:"10px 12px",fontSize:13,height:80,resize:"none",outline:"none"}}/>
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:"12px 16px",borderTop:"1px solid #f0f0f0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:14,color:"#777"}}>총 결제금액</span>
          <span style={{fontSize:20,fontWeight:700,color:"#ff6b00"}}>{total.toLocaleString()}원</span>
        </div>
        <button onClick={handleOrder} disabled={loading}
          style={{width:"100%",background:loading?"#ffb380":"#ff6b00",color:"#fff",padding:"14px",borderRadius:12,fontSize:16,fontWeight:700,border:"none"}}>
          {loading?"처리 중...":`${total.toLocaleString()}원 결제하기`}
        </button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   OrdersPage - 실제 API 연결
───────────────────────────────────────── */
function OrdersPage({setPage, user}) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!user) { setPage("login"); return; }
    api.getMyOrders()
      .then(data => {
        const list = Array.isArray(data) ? data : (data.content || []);
        setOrders(list);
      })
      .catch(e => {
        console.error(e);
        setOrders([]);
      })
      .finally(() => setLoading(false));
  }, []);

  return (
    <div style={{padding:"16px",paddingBottom:80}}>
      <p style={{fontWeight:700,fontSize:17,marginBottom:16}}>내 주문 내역</p>
      {loading && <p style={{textAlign:"center",color:"#aaa",padding:20}}>불러오는 중...</p>}
      {!loading && orders.length===0 && (
        <div style={{textAlign:"center",padding:"40px 0",color:"#bbb"}}>
          <p style={{fontSize:32,marginBottom:8}}>📋</p>
          <p style={{fontSize:14}}>주문 내역이 없습니다</p>
        </div>
      )}
      {orders.map(order=>(
        <div key={order.orderId} style={{background:"#fff",borderRadius:12,padding:"14px",marginBottom:10,border:"1px solid #f0f0f0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <p style={{fontWeight:700,fontSize:15}}>메뉴 #{order.productId}</p>
            <span style={{fontSize:12,padding:"2px 8px",borderRadius:10,fontWeight:600,
              background:STATUS_BG[order.status]||"#f5f5f5",
              color:STATUS_COLOR[order.status]||"#888"}}>
              {STATUS_LABEL[order.status]||order.status}
            </span>
          </div>
          <p style={{fontSize:13,color:"#aaa",marginBottom:6}}>수량: {order.quantity}개</p>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <p style={{fontSize:12,color:"#ccc"}}></p>
            <p style={{fontSize:15,fontWeight:700}}>{order.totalPrice?.toLocaleString()}원</p>
          </div>
        </div>
      ))}
      <button onClick={()=>setPage("main")}
        style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",
          background:"#fff",border:"1px solid #eee",borderRadius:24,padding:"8px 20px",
          fontSize:13,color:"#555",fontWeight:600,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",whiteSpace:"nowrap"}}>
        ← 홈으로
      </button>
    </div>
  );
}

/* ─────────────────────────────────────────
   ProductForm - 공통 폼 (등록/수정)
───────────────────────────────────────── */
function ProductForm({title, initial, onSubmit, onCancel, loading, showStoreId}) {
  const [form, setForm] = useState(initial);
  const field = (key, label, type="text", placeholder="") => (
    <div style={{marginBottom:14}}>
      <p style={{fontSize:13,color:"#777",marginBottom:4}}>{label}</p>
      <input type={type} value={form[key]||""} onChange={e=>setForm({...form,[key]:e.target.value})}
        placeholder={placeholder}
        style={{width:"100%",padding:"10px 12px",border:"1px solid #eee",borderRadius:8,fontSize:14,outline:"none"}}/>
    </div>
  );
  return (
    <div style={{padding:"20px 16px",paddingBottom:100}}>
      <p style={{fontWeight:700,fontSize:17,marginBottom:20}}>{title}</p>
      <div style={{background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #f0f0f0"}}>
        {showStoreId && field("storeId","가게 ID *","number","가게 ID를 입력하세요 (1, 2, 3...)")}
        {field("name","메뉴명 *","text","메뉴명을 입력하세요")}
        {field("price","가격 (원) *","number","숫자만 입력")}
        <div style={{marginBottom:14}}>
          <p style={{fontSize:13,color:"#777",marginBottom:4}}>카테고리</p>
          <select value={form.category||"치킨"} onChange={e=>setForm({...form,category:e.target.value})}
            style={{width:"100%",padding:"10px 12px",border:"1px solid #eee",borderRadius:8,fontSize:14,outline:"none",background:"#fff"}}>
            {["후라이드","양념","반반","롤","사시미","분식","기타"].map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input type="checkbox" id="pop" checked={form.popularity||false} onChange={e=>setForm({...form,popularity:e.target.checked})}/>
          <label htmlFor="pop" style={{fontSize:14,color:"#555"}}>인기 메뉴로 표시</label>
        </div>
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:"12px 16px",borderTop:"1px solid #f0f0f0",display:"flex",gap:10}}>
        <button onClick={onCancel} style={{padding:"12px 20px",borderRadius:12,border:"1px solid #eee",fontSize:14,fontWeight:600,color:"#555",background:"#fff"}}>취소</button>
        <button onClick={()=>onSubmit(form)} disabled={loading}
          style={{flex:1,background:loading?"#ffb380":"#ff6b00",color:"#fff",padding:"12px",borderRadius:12,fontSize:15,fontWeight:700,border:"none"}}>
          {loading?"처리 중...":title}
        </button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   RegisterPage (OWNER 전용)
───────────────────────────────────────── */
function RegisterPage({setPage, user}) {
  const [loading, setLoading] = useState(false);
  if (!user || user.role!=="OWNER") { setPage("main"); return null; }

  const handleSubmit = async (form) => {
    if (!form.storeId) { alert("가게 ID를 입력하세요"); return; }
    if (!form.name) { alert("메뉴명을 입력하세요"); return; }
    if (!form.price) { alert("가격을 입력하세요"); return; }
    setLoading(true);
    try {
      await api.createMenu(form.storeId, {
        name: form.name,
        category: form.category || "기타",
        price: parseInt(form.price),
        popularity: form.popularity || false
      });
      alert("메뉴가 등록되었습니다!");
      setPage("main");
    } catch(e) { alert(e.message); }
    finally { setLoading(false); }
  };

  return (
    <ProductForm
      title="메뉴 등록"
      initial={{storeId:"", name:"", category:"후라이드", price:"", popularity:false}}
      onSubmit={handleSubmit}
      onCancel={()=>setPage("main")}
      loading={loading}
      showStoreId={true}
    />
  );
}

/* ─────────────────────────────────────────
   EditPage (OWNER 전용)
───────────────────────────────────────── */
function EditPage({product, setPage, user}) {
  const [loading, setLoading] = useState(false);
  if (!user || user.role!=="OWNER" || !product) { setPage("main"); return null; }

  const handleSubmit = async (form) => {
    if (!form.name) { alert("메뉴명을 입력하세요"); return; }
    if (!form.price) { alert("가격을 입력하세요"); return; }
    setLoading(true);
    try {
      await api.updateMenu(product.storeId, product.id, {
        name: form.name,
        category: form.category,
        price: parseInt(form.price),
        popularity: form.popularity || false
      });
      alert("메뉴가 수정되었습니다!");
      setPage("main");
    } catch(e) { alert(e.message); }
    finally { setLoading(false); }
  };

  return (
    <ProductForm
      title="메뉴 수정"
      initial={{name:product.name, category:product.category, price:product.price, popularity:product.popularity||false}}
      onSubmit={handleSubmit}
      onCancel={()=>setPage("main")}
      loading={loading}
      showStoreId={false}
    />
  );
}

/* ─────────────────────────────────────────
   LoginPage (실제 API 연결)
───────────────────────────────────────── */
function LoginPage({setPage, setUser}) {
  const [isSignup, setIsSignup] = useState(false);
  const [form, setForm] = useState({email:"",password:"",name:"",phone:"",role:"CUSTOMER"});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleAuth = async () => {
    setError("");
    if (!form.email||!form.password) { setError("이메일과 비밀번호를 입력하세요"); return; }
    if (isSignup&&!form.name) { setError("이름을 입력하세요"); return; }
    if (isSignup&&form.password.length<8) { setError("비밀번호는 8자 이상이어야 합니다"); return; }
    if (isSignup&&!/^\d{10,11}$/.test(form.phone)) { setError("전화번호는 숫자만 10~11자리로 입력하세요"); return; }
    setLoading(true);
    try {
      if (isSignup) {
        await api.signup({email:form.email, password:form.password, name:form.name, phone:form.phone, role:form.role});
      }
      const data = await api.login({email:form.email, password:form.password});
      api.setToken(data.accessToken);
      const payload = JSON.parse(atob(data.accessToken.split(".")[1]));
      const role = payload.role || form.role || "CUSTOMER";
      setUser({email:form.email, name:form.name||form.email.split("@")[0], role});
      setPage("main");
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const field = (key, label, type="text", placeholder="") => (
    <div style={{marginBottom:10}}>
      <p style={{fontSize:12,color:"#aaa",marginBottom:4}}>{label}</p>
      <input type={type} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} placeholder={placeholder}
        style={{width:"100%",padding:"11px 13px",borderRadius:10,border:"1px solid #eee",fontSize:14,outline:"none"}}/>
    </div>
  );

  return (
    <div style={{padding:"32px 20px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <p style={{fontSize:48,marginBottom:6}}>🛵</p>
        <p style={{fontSize:26,fontWeight:700,color:"#ff6b00"}}>땡겨요</p>
        <p style={{fontSize:13,color:"#bbb",marginTop:4}}>맛있는 음식을 집에서 편하게</p>
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:"20px",border:"1px solid #f0f0f0"}}>
        <div style={{display:"flex",marginBottom:18,background:"#f5f5f5",borderRadius:10,padding:3}}>
          {["로그인","회원가입"].map((t,i)=>(
            <button key={t} onClick={()=>{setIsSignup(i===1);setError("");}}
              style={{flex:1,padding:"8px",borderRadius:8,fontSize:14,fontWeight:600,border:"none",
                background:isSignup===(i===1)?"#fff":"transparent",
                color:isSignup===(i===1)?"#ff6b00":"#aaa",
                boxShadow:isSignup===(i===1)?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
              {t}
            </button>
          ))}
        </div>
        {isSignup && (
          <>
            {field("name","이름 *","text","홍길동")}
            {field("phone","전화번호 * (숫자만 10~11자리)","text","01012345678")}
            <div style={{marginBottom:10}}>
              <p style={{fontSize:12,color:"#aaa",marginBottom:4}}>역할 *</p>
              <div style={{display:"flex",gap:8}}>
                {[["CUSTOMER","일반 회원"],["OWNER","사장님"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setForm({...form,role:val})}
                    style={{flex:1,padding:"10px",borderRadius:10,fontSize:13,fontWeight:600,border:"none",
                      background:form.role===val?"#ff6b00":"#f5f5f5",color:form.role===val?"#fff":"#777"}}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
          </>
        )}
        {field("email","이메일 *","email","example@email.com")}
        {field("password","비밀번호 * (8자 이상)","password","••••••••")}
        {error && (
          <div style={{background:"#fff0f0",border:"1px solid #f5c0c0",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <p style={{fontSize:13,color:"#cc3333"}}>{error}</p>
          </div>
        )}
        <button onClick={handleAuth} disabled={loading}
          style={{width:"100%",background:loading?"#ffb380":"#ff6b00",color:"#fff",padding:"13px",borderRadius:12,fontSize:15,fontWeight:700,border:"none",marginTop:4}}>
          {loading?"처리 중...":isSignup?"회원가입":"로그인"}
        </button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   App
───────────────────────────────────────── */
function App() {
    const [page, setPage] = useState("main");
    const [user, setUser] = useState(null);
    const [selectedProduct, setSelectedProduct] = useState(null);
    const [orderProduct, setOrderProduct] = useState(null);
    const [refreshKey, setRefreshKey] = useState(0);  // 추가

    // 메인으로 이동 시 메뉴 목록 새로고침
    const goMain = () => {
        setRefreshKey(k => k + 1);
        setPage("main");
    };

    const renderPage = () => {
        switch(page) {
            case "main":     return <MainPage key={refreshKey} setPage={setPage} setSelectedProduct={setSelectedProduct} user={user}/>;
            case "detail":   return <DetailPage product={selectedProduct} setPage={setPage} user={user} setOrderProduct={setOrderProduct}/>;
            case "order":    return <OrderPage product={orderProduct} setPage={setPage} user={user}/>;
            case "orders":   return <OrdersPage setPage={setPage} user={user}/>;
            case "register": return <RegisterPage setPage={goMain} user={user}/>;
            case "edit":     return <EditPage product={selectedProduct} setPage={goMain} user={user}/>;
            case "login":    return <LoginPage setPage={setPage} setUser={setUser}/>;
            default:         return null;
        }
    };

    return (
        <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#f5f5f5"}}>
            <Header setPage={setPage} user={user} setUser={setUser}/>
            {renderPage()}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
